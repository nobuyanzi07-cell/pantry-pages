<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Recipe - Pantry Pages</title>
    <link rel="stylesheet" href="styles.css">
</head>


<body>
    <header>
        <h1>Add New Recipe</h1>
        <nav>
            <a href="index.html">Gallery Home</a>
            <a href="add.html">Add Recipe</a>
            <a href="planner.html">Meal Planner</a>
        </nav>
    </header>

    <main>
        <section>
            <form id="recipeForm">
                <label for="recipeName">Recipe Name:</label>
                <input type="text" id="recipeName" required>

                <label for="ingredients">Ingredients (comma separated):</label>
                <textarea id="ingredients" required></textarea>

                <label for="instructions">Instructions:</label>
                <textarea id="instructions" required></textarea>

                <button type="submit">Save and Add Recipe</button>
            </form>
        </section>
    </main>

    <footer>
        <p>&copy; 2026 Pantry Pages. All rights reserved.</p>
    </footer>

    <script src="scripts.js"></script>

</body>

</html>
