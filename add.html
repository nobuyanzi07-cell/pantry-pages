<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Add Recipe - Pantry Pages</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>Add New Recipe</h1>
    <nav>
      <a href="index.html">Gallery Home</a>
      <a href="add.html" aria-current="page">Add Recipe</a>
      <a href="planner.html">Meal Planner</a>
    </nav>
  </header>

  <main>
    <section>
      <form id="recipeForm">
        <fieldset>
          <legend>Recipe Details</legend>

          <label for="recipeName">Recipe Name:</label>
          <input type="text" id="recipeName" name="recipeName" required placeholder="Ugali">

          <label for="ingredients">Ingredients (comma separated):</label>
          <textarea id="ingredients" name="ingredients" required
            placeholder="tomato, spices, raw pasta"></textarea>

          <label for="instructions">Instructions:</label>
          <textarea id="instructions" name="instructions" required
            placeholder="Step-by-step cooking path"></textarea>

          <button type="submit">Save and Add Recipe</button>
          <button type="reset">Clear Entry</button>
        </fieldset>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 Pantry Pages. All rights reserved.</p>
  </footer>
  <script src="scripts.js"></script>
</body>
</html>
