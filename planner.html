<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Meal Planner - PantryPages</title>
  <link rel="stylesheet" href="styles.css">
</head>


<body>
  <header>
    <h1>Meal Planner</h1>
    <nav>
      <a href="index.html">Gallery Home</a>
      <a href="add.html">Add Recipe</a>
      <a href="planner.html">Meal Planner</a>
    </nav>
  </header>

  <main>
    <section>
      <h2>Plan Your Week</h2>

      <!-- Weekly grid scaffold -->
      <div id="mealPlan">
        <div class="day">
          <h3>Monday</h3>
          <ul>
            <li>Breakfast: <span id="monday-breakfast"></span></li>
            <li>Lunch: <span id="monday-lunch"></span></li>
            <li>Dinner: <span id="monday-dinner"></span></li>
          </ul>
        </div>
        <div class="day">
          <h3>Tuesday</h3>
          <ul>
            <li>Breakfast: <span id="tuesday-breakfast"></span></li>
            <li>Lunch: <span id="tuesday-lunch"></span></li>
            <li>Dinner: <span id="tuesday-dinner"></span></li>
          </ul>
        </div>
        <!-- Repeat for other days of the week -->
      </div>

      <!-- Form for adding meals -->
      <form id="addMealForm">
        <label for="day">Day:</label>
        <select id="day" name="day">
          <option>Monday</option>
          <option>Tuesday</option>
          <option>Wednesday</option>
          <option>Thursday</option>
          <option>Friday</option>
          <option>Saturday</option>
          <option>Sunday</option>
        </select>

        <label for="mealType">Meal:</label>
        <select id="mealType" name="mealType">
          <option>Breakfast</option>
          <option>Lunch</option>
          <option>Dinner</option>
        </select>

        <label for="mealName">Recipe:</label>
        <input type="text" id="mealName" name="mealName" placeholder="Enter recipe name">

        <button type="submit">Add Meal</button>
      </form>
    </section>
  </main>

  <footer>
    <p>&copy; 2026 PantryPages</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
